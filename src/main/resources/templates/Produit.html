<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Produits</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Liste des Produits</h1>

    <!-- Tableau des produits -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Catégorie</th>
            <th>Prix</th>
            <th>Quantité</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <!-- Boucle sur la liste des produits -->
        <tr th:each="produit : ${produits}">
            <td th:text="${produit.id}"></td>
            <td th:text="${produit.nom}"></td>
            <td th:text="${produit.categorie}"></td>
            <td th:text="${produit.prix}"></td>
            <td th:text="${produit.quantite}"></td>
            <td>
                <a th:href="@{'/produits/modifier/' + ${produit.id}}" class="btn btn-sm btn-primary">Modifier</a>
                <a th:href="@{'/produits/supprimer/' + ${produit.id}}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce produit ?');">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Formulaire pour ajouter un produit -->
    <h2 class="mt-5">Ajouter un produit</h2>
    <form th:action="@{/produits}" th:object="${produit}" method="post">
        <div class="mb-3">
            <label for="nom" class="form-label">Nom :</label>
            <input type="text" class="form-control" id="nom" th:field="*{nom}" required>
        </div>
        <div class="mb-3">
            <label for="categorie" class="form-label">Catégorie :</label>
            <input type="text" class="form-control" id="categorie" th:field="*{categorie}" required>
        </div>
        <div class="mb-3">
            <label for="prix" class="form-label">Prix :</label>
            <input type="number" step="0.01" class="form-control" id="prix" th:field="*{prix}" required>
        </div>
        <div class="mb-3">
            <label for="quantite" class="form-label">Quantité :</label>
            <input type="number" class="form-control" id="quantite" th:field="*{quantite}" required>
        </div>
        <button type="submit" class="btn btn-success">Ajouter</button>
    </form>
</div>
</body>
</html>
